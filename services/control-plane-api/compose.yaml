services:
  postgres:
    image: postgres:17-alpine
    container_name: store-control-plane-postgres
    environment:
      POSTGRES_DB: store_control_plane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "54321:5432"
    volumes:
      - control_plane_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d store_control_plane"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  control_plane_postgres:
